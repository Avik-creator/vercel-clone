services:
  db:
    image: postgres:17-alpine
    container_name: vercel-clone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vercel_clone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.11-alpine
    container_name: vercel-clone-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/var/lib/nats

  minio:
    image: minio/minio:latest
    container_name: vercel-clone-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: crates/api/Dockerfile
    container_name: vercel-clone-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/vercel_clone
      NATS_URL: nats://nats:4222
    develop:
      watch:
        - action: rebuild
          path: .
          target: /app

  worker:
    build:
      context: .
      dockerfile: crates/build-worker/Dockerfile
    container_name: vercel-clone-worker
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_tmp:/tmp/builds
    env_file:
      - .env
    environment:
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: deployments
      DOCKER_NETWORK: vercel-clone_default

volumes:
  pgdata:
  nats_data:
  minio_data:
  worker_tmp:
