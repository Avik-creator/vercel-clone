services:
  db:
    image: postgres:17-alpine
    container_name: vercel-clone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vercel_clone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.11-alpine
    container_name: vercel-clone-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/var/lib/nats

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vercel-clone-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/vercel_clone
      NATS_URL: nats://nats:4222
    develop:
      watch:
        - action: rebuild
          path: .
          target: /app

volumes:
  pgdata:
  nats_data:
