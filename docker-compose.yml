services:
  traefik:
    image: traefik:v3
    container_name: vercel-clone-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=vercel-clone_default
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-you@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/letsencrypt
    networks:
      - default
      - serve-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  db:
    image: postgres:17-alpine
    container_name: vercel-clone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vercel_clone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: vercel-clone-pgbouncer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: vercel_clone
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  nats:
    image: nats:2.11-alpine
    container_name: vercel-clone-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222", "--user", "${NATS_USER:-nats}", "--pass", "${NATS_PASSWORD}"]
    volumes:
      - nats_data:/var/lib/nats
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: vercel-clone-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  registry:
    image: registry:2
    container_name: vercel-clone-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  buildkit:
    image: moby/buildkit
    container_name: buildkit
    restart: unless-stopped
    privileged: true
    command: ["--addr", "unix:///run/buildkit/buildkitd.sock", "--config", "/etc/buildkit/buildkitd.toml"]
    volumes:
      - ./infra/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro
      - /var/run/buildkit:/var/run/buildkit
    healthcheck:
      test: ["CMD", "buildctl", "--addr", "unix:///run/buildkit/buildkitd.sock", "debug", "workers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - build-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  api:
    build:
      context: .
      dockerfile: crates/api/Dockerfile
    container_name: vercel-clone-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      registry:
        condition: service_started
    expose:
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp/vercel-clone-deployments:uid=1001,gid=1001
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:5432/vercel_clone
      NATS_URL: nats://nats:4222
      NATS_USER: ${NATS_USER:-nats}
      NATS_PASSWORD: ${NATS_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: deployments
      DOCKER_NETWORK: vercel-clone_default
      SERVE_NETWORK: vercel-clone_serve-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=vercel-clone_default"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

      # REST API — api.localhost goes to the API
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.service=api"
      - "traefik.http.routers.api.priority=30"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

    networks:
      - default
      - serve-net

  worker:
    build:
      context: .
      dockerfile: crates/build-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      registry:
        condition: service_started
      buildkit:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/buildkit:/var/run/buildkit
    tmpfs:
      - /tmp/builds:uid=1001,gid=1001
    env_file:
      - .env
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: ${NATS_USER:-nats}
      NATS_PASSWORD: ${NATS_PASSWORD}
      REGISTRY_URL: localhost:5000
      BUILD_REGISTRY_URL: registry:5000
      BUILD_NETWORK: vercel-clone_build-net
      MAX_CONCURRENT_BUILDS: 2
      BUILDKIT_HOST: unix:///var/run/buildkit/buildkitd.sock
    user: root
    networks:
      - default
      - build-net
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-alive || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: vercel-clone-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  loki:
    image: grafana/loki:3.0.0
    container_name: vercel-clone-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./infra/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:11.0.0
    container_name: vercel-clone-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  alloy:
    image: grafana/alloy:latest
    container_name: vercel-clone-alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./infra/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:17
    container_name: vercel-clone-postgres-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: vercel_clone
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    volumes:
      - pgbackups:/backups
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

volumes:
  pgdata:
  nats_data:
  minio_data:
  # worker_tmp removed — worker uses tmpfs for ephemeral build directories
  traefik_acme:
  registry_data:
  prometheus_data:
  loki_data:
  grafana_data:
  pgbackups:

networks:
  default:
    name: vercel-clone_default
  serve-net:
    name: vercel-clone_serve-net
  build-net:
    name: vercel-clone_build-net
