services:
  traefik:
    image: traefik:v3
    container_name: vercel-clone-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=vercel-clone_default
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - "80:80"
      - "8081:8080" # Traefik dashboard at http://localhost:8081
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: postgres:17-alpine
    container_name: vercel-clone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vercel_clone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.11-alpine
    container_name: vercel-clone-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/var/lib/nats

  minio:
    image: minio/minio:latest
    container_name: vercel-clone-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: crates/api/Dockerfile
    container_name: vercel-clone-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_started
    expose:
      - "8080"
    ports:
      - "8080:8080" # keep direct access for dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # needed to manage deployment containers
      - /tmp/vercel-clone-deployments:/tmp/deployments
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/vercel_clone
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: deployments
      DOCKER_NETWORK: vercel-clone_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

      # REST API — api.localhost goes to the API
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.service=api"
      - "traefik.http.routers.api.priority=30"

      # Preview deployments — *.localhost catch-all also goes to the API.
      # serve_artifact handles static files from MinIO and proxies SSR to node containers.
      - "traefik.http.routers.serve.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.localhost`)"
      - "traefik.http.routers.serve.entrypoints=web"
      - "traefik.http.routers.serve.service=api"
      - "traefik.http.routers.serve.priority=10"

  worker:
    build:
      context: .
      dockerfile: crates/build-worker/Dockerfile
    container_name: vercel-clone-worker
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_tmp:/tmp/builds
    env_file:
      - .env
    environment:
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: deployments
      DOCKER_NETWORK: vercel-clone_default

volumes:
  pgdata:
  nats_data:
  minio_data:
  worker_tmp:
